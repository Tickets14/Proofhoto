name: proofhoto
description: "Proof — Photo-evidence habit tracker. Mark habits done only with a photo."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Local Database
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Charts
  fl_chart: ^0.68.0

  # Camera / Gallery
  image_picker: ^1.1.2

  # Local Notifications
  flutter_local_notifications: ^17.2.4

  # Timezone Support
  timezone: ^0.9.4

  # File Storage
  path_provider: ^2.1.4

  # Image Compression
  flutter_image_compress: ^2.3.0

  # UUID Generation
  uuid: ^4.5.1

  # Date Formatting
  intl: ^0.19.0

  # Video Playback
  video_player: ^2.9.2

  # Video Compression
  video_compress: ^3.1.3

  # Video Thumbnail Generation
  video_thumbnail: ^0.5.3

  # Permissions
  permission_handler: ^11.3.1

  # Path manipulation
  path: ^1.9.0

  # Fonts (use runtime fetching in dev; bundle for production)
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation (for Hive adapters)
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
